name = "drivertax-sync-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "drivertax-sync"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "drivertax-receipts"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "driver_events"

[vars]
ENVIRONMENT = "production"
